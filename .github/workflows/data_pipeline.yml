name: Data Pipeline

on:
  schedule:
    # Kjøres hver mandag kl. 06:00 UTC
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "config/variables.yaml"
      - "src/data/**"
  workflow_dispatch:  # Tillat manuell kjøring

jobs:
  fetch-data:
    name: Fetch and store data
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Trengs for å committe oppdatert data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m src.data.pipeline

      - name: Commit new data vintages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/processed/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: ukentlig dataoppdatering $(date -u +%Y-%m-%d)"
            git push
          fi
